<text x="84" y="642" fill="#cbd5e1" font-family="Inter,Arial" font-size="16" font-weight="700">• MikroTik biasanya menjadi gateway LAN, DHCP server, DNS cache, NAT, firewall, dan queue.</text>
<text x="84" y="668" fill="#cbd5e1" font-family="Inter,Arial" font-size="16" font-weight="700">• Switch menjadi pusat distribusi kabel; AP melayani Wi-Fi; server menyimpan layanan lokal.</text>
<text x="84" y="694" fill="#cbd5e1" font-family="Inter,Arial" font-size="16" font-weight="700">• Troubleshooting: cek client → switch/AP → MikroTik → ONT/ISP → internet.</text>
